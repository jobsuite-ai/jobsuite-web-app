version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          set -e
          npm ci

          SECRET_ARN="${AWS_CREDENTIALS_SECRET_ARN:-arn:aws:secretsmanager:us-west-2:122610504404:secret:jobsuite-web-app/aws-credentials-O7MIkg}"
          echo "Resolving Secrets Manager credentials from: $SECRET_ARN"
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --query SecretString --output text)
          export SECRET_JSON
          if [ -n "$SECRET_JSON" ]; then
            APP_AWS_ACCESS_KEY_ID=$(python3 -c "import json,os; print(json.loads(os.environ['SECRET_JSON']).get('AWS_ACCESS_KEY_ID',''))")
            APP_AWS_SECRET_ACCESS_KEY=$(python3 -c "import json,os; print(json.loads(os.environ['SECRET_JSON']).get('AWS_SECRET_ACCESS_KEY',''))")
            if [ -n "$APP_AWS_ACCESS_KEY_ID" ] && [ -n "$APP_AWS_SECRET_ACCESS_KEY" ]; then
              echo "APP_AWS_ACCESS_KEY_ID=$APP_AWS_ACCESS_KEY_ID" >> .env.production
              echo "APP_AWS_SECRET_ACCESS_KEY=$APP_AWS_SECRET_ACCESS_KEY" >> .env.production
              if [ -n "$APP_AWS_REGION" ]; then
                echo "APP_AWS_REGION=$APP_AWS_REGION" >> .env.production
              fi
              if [ -n "$LOG_GROUP_NAME" ]; then
                echo "LOG_GROUP_NAME=$LOG_GROUP_NAME" >> .env.production
              fi
              echo "Resolved AWS credentials into .env.production"
            else
              echo "Failed to parse AWS credentials from secret JSON"
              exit 1
            fi
          else
            echo "Failed to fetch secret value from Secrets Manager"
            exit 1
          fi

          if [ "$AWS_BRANCH" = "prod" ] || [ "$AWS_BRANCH" = "production" ]; then
            echo "Building for PRODUCTION ($AWS_BRANCH branch) - will use api.jobsuite.app"
          elif [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "qa" ] || [ "$AWS_BRANCH" = "staging" ]; then
            echo "Building for QA/DEVELOPMENT ($AWS_BRANCH branch) - will use qa.api.jobsuite.app"
          else
            echo "Building for DEVELOPMENT ($AWS_BRANCH branch) - will use qa.api.jobsuite.app"
          fi
          echo Branch=$AWS_BRANCH
          echo NODE_ENV=$NODE_ENV
          echo AMPLIFY_BRANCH_WRITTEN=$AWS_BRANCH
          if [ -n "$WEBHOOK_EMAIL" ]; then
            echo WEBHOOK_EMAIL_CONFIGURED=yes
          else
            echo WEBHOOK_EMAIL_CONFIGURED=no
          fi

          # Amplify sets env vars (and resolved secrets) in the build environment, but Next.js
          # inlines server env from .env.production at build time. Append server-side vars here.
          # Note: `grep ... || true >> file` is wrong — a successful grep writes to stdout, not the file.
          env | grep -E '^JIRA_|^WEBHOOK_|^RESEND_|^SUPPORT_FROM_EMAIL=' >> .env.production || true
          echo "Jira/webhook-related keys appended to .env.production (if present in build env)"

          # Branch identity for getApiBaseUrl() and similar — must be last so it wins over any
          # duplicate keys. Prefer AWS_BRANCH (Amplify-injected); fall back to AMPLIFY_BRANCH from console.
          BRANCH_REF="${AWS_BRANCH:-${AMPLIFY_BRANCH:-}}"
          if [ -z "$BRANCH_REF" ]; then
            echo "ERROR: Neither AWS_BRANCH nor AMPLIFY_BRANCH is set in the Amplify build environment."
            exit 1
          fi
          echo "AWS_BRANCH=$BRANCH_REF" >> .env.production
          echo "AMPLIFY_BRANCH=$BRANCH_REF" >> .env.production
          echo "VERIFY .env.production branch keys (values masked):"
          grep -E '^(AWS_BRANCH|AMPLIFY_BRANCH)=' .env.production | tail -n 2 | sed 's/=.*/=<set>/'
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*